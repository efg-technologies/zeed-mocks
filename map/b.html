<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Zeed — Context Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F0F12;color:#e4e4e7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;touch-action:none;-webkit-tap-highlight-color:transparent}
header{position:fixed;top:0;left:0;right:0;z-index:20;padding:12px 16px 10px;background:rgba(15,15,18,.65);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.06)}
header h1{font-size:13px;font-weight:600;letter-spacing:.04em;color:#a1a1aa;text-transform:uppercase;margin-bottom:6px}
#breadcrumb{display:flex;align-items:center;gap:4px;font-size:14px;min-height:28px;flex-wrap:wrap}
.crumb{padding:4px 10px;border-radius:8px;background:rgba(91,33,182,.18);color:#c4b5fd;cursor:pointer;white-space:nowrap;min-height:28px;display:flex;align-items:center}
.crumb:last-child{background:rgba(91,33,182,.35);color:#ede9fe}
.crumb-sep{color:#52525b;font-size:11px}
svg{flex:1;width:100%;display:block}
#detail{position:fixed;bottom:0;left:0;right:0;z-index:20;padding:16px 18px 24px;background:rgba(15,15,18,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.07);transform:translateY(0);transition:transform .3s ease}
#detail .d-type{font-size:11px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:2px}
#detail .d-label{font-size:20px;font-weight:700;margin-bottom:4px}
#detail .d-imp{font-size:12px;color:#a1a1aa;margin-bottom:8px}
#detail .d-reason{font-size:13px;color:#a1a1aa;line-height:1.45;margin-bottom:8px}
#detail .d-conns{font-size:12px;color:#71717a;line-height:1.6}
#detail .d-conns span{color:#a1a1aa}
</style>
</head>
<body>
<header>
  <h1>Context Map</h1>
  <div id="breadcrumb"></div>
</header>
<svg id="graph"></svg>
<div id="detail"></div>
<script>
const NODES=[
  {id:"memex",label:"Memex",type:"concept",imp:5},
  {id:"vectordb",label:"Vector DB",type:"technology",imp:5},
  {id:"sqlitevec",label:"sqlite-vec",type:"technology",imp:4},
  {id:"embgemma",label:"EmbeddingGemma",type:"technology",imp:4},
  {id:"profile",label:"Profile/TG/Tab",type:"concept",imp:4},
  {id:"chromium",label:"Chromium 147",type:"technology",imp:3},
  {id:"aibrowser",label:"AI Browser",type:"concept",imp:5},
  {id:"comet",label:"Comet",type:"decision",imp:4},
  {id:"atlas",label:"Atlas",type:"decision",imp:3},
  {id:"llmmem",label:"LLM Memory",type:"concept",imp:4},
  {id:"zettel",label:"Zettelkasten",type:"concept",imp:3},
  {id:"semret",label:"semantic retrieval",type:"finding",imp:4},
  {id:"localfirst",label:"local-first",type:"decision",imp:5},
  {id:"gdpr",label:"GDPR",type:"finding",imp:3},
  {id:"mojo",label:"Mojo IPC",type:"technology",imp:2},
  {id:"openrouter",label:"OpenRouter",type:"technology",imp:3},
  {id:"agentloop",label:"Agent Loop",type:"concept",imp:4},
  {id:"cdp",label:"CDP",type:"technology",imp:2},
  {id:"tabstrip",label:"TabStripModel",type:"technology",imp:2}
];
const EDGES=[
  ["memex","vectordb",.9],["memex","zettel",.8],["memex","aibrowser",.7],["memex","llmmem",.8],
  ["vectordb","sqlitevec",.95],["vectordb","embgemma",.85],["vectordb","semret",.9],["vectordb","localfirst",.7],
  ["sqlitevec","localfirst",.8],["sqlitevec","chromium",.5],
  ["embgemma","semret",.8],["embgemma","openrouter",.4],
  ["profile","aibrowser",.85],["profile","tabstrip",.7],["profile","comet",.6],
  ["chromium","mojo",.7],["chromium","tabstrip",.8],["chromium","cdp",.6],
  ["aibrowser","comet",.8],["aibrowser","agentloop",.75],["aibrowser","localfirst",.9],
  ["comet","atlas",.7],["comet","agentloop",.6],
  ["llmmem","agentloop",.8],["llmmem","semret",.7],
  ["localfirst","gdpr",.85],
  ["openrouter","agentloop",.65],["openrouter","llmmem",.5],
  ["cdp","agentloop",.4]
];
const REASONS={
  memex:"The foundational vision: a personal knowledge augmentation system. Zeed inherits this lineage.",
  vectordb:"Core infrastructure for semantic memory. Every browsing moment becomes a retrievable embedding.",
  sqlitevec:"The local-first vector store. Runs inside Chromium, no cloud dependency for embeddings.",
  embgemma:"On-device embedding model. Converts browsing context to vectors without leaving the machine.",
  profile:"The knowledge hierarchy: Profile > TabGroup > Tab. Each layer accumulates understanding.",
  chromium:"The platform substrate. Zeed extends Chromium 147 with AI-native capabilities.",
  aibrowser:"The product concept: a browser that thinks with you, not just for you.",
  comet:"Sidebar-first architecture decision. The AI surface lives beside your content.",
  atlas:"Full-page knowledge map view. Birds-eye exploration of your connected understanding.",
  llmmem:"How the LLM retains and recalls user context across sessions and tabs.",
  zettel:"Inspiration model: atomic, linked notes. Zeed automates what Zettelkasten requires manually.",
  semret:"Finding: semantic search outperforms keyword search for personal knowledge by 3x.",
  localfirst:"Core decision: all user data stays on-device. Cloud is optional, never required.",
  gdpr:"Finding: local-first architecture inherently satisfies GDPR data residency requirements.",
  mojo:"Chromium IPC layer. Used for communication between browser process and AI service.",
  openrouter:"Multi-model routing for cloud-optional LLM calls. Fallback when local models lack capacity.",
  agentloop:"The think-act cycle: observe context, form plan, take action, evaluate result.",
  cdp:"Chrome DevTools Protocol. Bridge for extension-based prototyping before native integration.",
  tabstrip:"Chromium's tab management model. Extended to carry per-tab knowledge metadata."
};
const TYPE_COLOR={concept:"#a78bfa",technology:"#60a5fa",decision:"#fb923c",finding:"#4ade80"};

const adj=new Map();NODES.forEach(n=>adj.set(n.id,[]));
EDGES.forEach(([a,b,s])=>{adj.get(a).push({to:b,s});adj.get(b).push({to:a,s})});
function bfs(centerId){
  const dist=new Map();dist.set(centerId,0);
  const q=[centerId];
  while(q.length){const u=q.shift();for(const{to}of adj.get(u)){if(!dist.has(to)){dist.set(to,dist.get(u)+1);q.push(to)}}}
  return dist;
}
let focusId="memex",trail=["memex"],animating=false;
const svg=document.getElementById("graph");
const ns="http://www.w3.org/2000/svg";
let W,H,cx,cy,R1,R2;

function measure(){
  W=window.innerWidth;H=window.innerHeight-120;
  cx=W/2;cy=H/2+30;
  R1=Math.min(W,H)*0.28;R2=Math.min(W,H)*0.46;
}

function layout(centerId){
  const dist=bfs(centerId);
  const ring1=[],ring2=[],far=[];
  NODES.forEach(n=>{
    const d=dist.get(n.id);
    if(n.id===centerId)return;
    if(d===1)ring1.push(n);
    else if(d===2)ring2.push(n);
    else far.push(n);
  });
  ring2.push(...far);
  const pos=new Map();
  pos.set(centerId,{x:cx,y:cy,ring:0});
  ring1.forEach((n,i)=>{
    const a=(2*Math.PI*i/ring1.length)-Math.PI/2;
    pos.set(n.id,{x:cx+R1*Math.cos(a),y:cy+R1*Math.sin(a),ring:1});
  });
  ring2.forEach((n,i)=>{
    const a=(2*Math.PI*i/ring2.length)-Math.PI/2+0.15;
    pos.set(n.id,{x:cx+R2*Math.cos(a),y:cy+R2*Math.sin(a),ring:2});
  });
  return pos;
}

let positions=null,nodeEls=new Map(),edgeEls=new Map(),labelEls=new Map();

function edgeKey(a,b){return a<b?a+"|"+b:b+"|"+a}

function buildSVG(){
  svg.innerHTML="";
  svg.setAttribute("viewBox",`0 0 ${W} ${H+60}`);
  // defs
  const defs=document.createElementNS(ns,"defs");
  const glow=document.createElementNS(ns,"filter");glow.id="glow";
  glow.innerHTML=`<feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>`;
  defs.appendChild(glow);
  svg.appendChild(defs);

  const edgeG=document.createElementNS(ns,"g");edgeG.id="edges";svg.appendChild(edgeG);
  const nodeG=document.createElementNS(ns,"g");nodeG.id="nodes";svg.appendChild(nodeG);

  EDGES.forEach(([a,b,s])=>{
    const p=document.createElementNS(ns,"path");
    p.setAttribute("fill","none");
    p.setAttribute("stroke","rgba(161,161,170,0.15)");
    p.setAttribute("stroke-width",Math.max(1,s*2));
    edgeG.appendChild(p);
    edgeEls.set(edgeKey(a,b),p);
  });

  NODES.forEach(n=>{
    const g=document.createElementNS(ns,"g");
    g.style.cursor="pointer";
    const c=document.createElementNS(ns,"circle");
    c.setAttribute("fill",TYPE_COLOR[n.type]);
    g.appendChild(c);
    if(n.id===focusId){
      const ring=document.createElementNS(ns,"circle");
      ring.setAttribute("fill","none");ring.setAttribute("stroke","#5B21B6");
      ring.setAttribute("stroke-width","3");ring.classList.add("focus-ring");
      g.appendChild(ring);
    }
    const t=document.createElementNS(ns,"text");
    t.setAttribute("text-anchor","middle");t.setAttribute("fill","#e4e4e7");
    t.setAttribute("font-size","11");t.setAttribute("font-weight","600");
    t.setAttribute("pointer-events","none");
    t.textContent=n.label;
    g.appendChild(t);
    g.addEventListener("click",()=>focusOn(n.id));
    g.addEventListener("touchend",e=>{e.preventDefault();focusOn(n.id)});
    nodeG.appendChild(g);
    nodeEls.set(n.id,{g,circle:c,text:t});
    labelEls.set(n.id,t);
  });
}

function applyPositions(pos,animate){
  const dur=animate?400:0;
  NODES.forEach(n=>{
    const p=pos.get(n.id);if(!p)return;
    const el=nodeEls.get(n.id);
    const r=p.ring===0?40:p.ring===1?28:18;
    const opacity=p.ring===2?0.5:1;
    el.g.style.transition=dur?`transform ${dur}ms cubic-bezier(.4,0,.2,1), opacity ${dur}ms ease`:"none";
    el.g.style.transform=`translate(${p.x}px,${p.y}px)`;
    el.g.style.opacity=opacity;
    el.circle.setAttribute("r",r);
    // focus ring
    const fr=el.g.querySelector(".focus-ring");
    if(n.id===focusId){
      if(!fr){
        const ring=document.createElementNS(ns,"circle");
        ring.setAttribute("fill","none");ring.setAttribute("stroke","#5B21B6");
        ring.setAttribute("stroke-width","3");ring.classList.add("focus-ring");
        ring.setAttribute("r",r+6);ring.setAttribute("filter","url(#glow)");
        el.g.insertBefore(ring,el.circle);
      } else {fr.setAttribute("r",r+6);fr.setAttribute("filter","url(#glow)")}
    } else if(fr){fr.remove()}
    el.text.setAttribute("dy",r+16);
    el.text.style.opacity=p.ring===2?0:1;
    // hover for outer ring
    if(p.ring===2){
      el.g.onmouseenter=()=>{el.text.style.opacity=1};
      el.g.onmouseleave=()=>{el.text.style.opacity=0};
    } else {el.g.onmouseenter=null;el.g.onmouseleave=null}
  });
  if(!animate)updateEdges(pos);
}

function renderBreadcrumb(){
  const bc=document.getElementById("breadcrumb");
  const show=trail.slice(-3);
  bc.innerHTML=show.map((id,i)=>{
    const n=NODES.find(n=>n.id===id);
    const sep=i<show.length-1?`<span class="crumb-sep">\u2192</span>`:"";
    return `<span class="crumb" data-id="${id}">${n.label}</span>${sep}`;
  }).join("");
  bc.querySelectorAll(".crumb").forEach(el=>{
    el.addEventListener("click",()=>{
      const tid=el.dataset.id;
      const idx=trail.indexOf(tid);
      if(idx>=0)trail=trail.slice(0,idx+1);
      focusOn(tid,true);
    });
  });
}

function renderDetail(){
  const n=NODES.find(n=>n.id===focusId);
  const conns=adj.get(focusId);
  const grouped={};conns.forEach(({to,s})=>{
    const tn=NODES.find(x=>x.id===to);
    if(!grouped[tn.type])grouped[tn.type]=[];
    grouped[tn.type].push(tn.label);
  });
  const connHtml=Object.entries(grouped).map(([t,labels])=>
    `<span style="color:${TYPE_COLOR[t]}">${t}:</span> ${labels.join(", ")}`
  ).join(" &middot; ");
  const stars="\u2605".repeat(n.imp)+"\u2606".repeat(5-n.imp);
  document.getElementById("detail").innerHTML=
    `<div class="d-type" style="color:${TYPE_COLOR[n.type]}">${n.type}</div>`+
    `<div class="d-label">${n.label}</div>`+
    `<div class="d-imp">${stars} relevance</div>`+
    `<div class="d-reason">${REASONS[n.id]||""}</div>`+
    `<div class="d-conns">${connHtml}</div>`;
}

function updateEdges(pos){
  EDGES.forEach(([a,b,s])=>{
    const pa=pos.get(a),pb=pos.get(b);if(!pa||!pb)return;
    const el=edgeEls.get(edgeKey(a,b));
    const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;
    const dx=pb.x-pa.x,dy=pb.y-pa.y;
    const cx1=mx-dy*0.15,cy1=my+dx*0.15;
    el.setAttribute("d",`M${pa.x},${pa.y} Q${cx1},${cy1} ${pb.x},${pb.y}`);
    const isOuter=(pa.ring===2||pb.ring===2);
    el.setAttribute("stroke",isOuter?"rgba(161,161,170,0.08)":"rgba(161,161,170,0.18)");
    el.setAttribute("stroke-dasharray",isOuter?"4,4":"none");
  });
}
function animateEdges(from,to,dur){
  const t0=performance.now();
  function tick(now){
    const t=Math.min(1,(now-t0)/dur);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const cur=new Map();
    NODES.forEach(n=>{
      const a=from.get(n.id),b=to.get(n.id);
      if(!a||!b)return;
      cur.set(n.id,{x:a.x+(b.x-a.x)*ease,y:a.y+(b.y-a.y)*ease,ring:b.ring});
    });
    updateEdges(cur);
    if(t<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function focusOn(id,fromBreadcrumb){
  if(animating||id===focusId)return;
  animating=true;
  const oldPos=positions;
  focusId=id;
  if(!fromBreadcrumb){
    if(trail[trail.length-1]!==id)trail.push(id);
  }
  positions=layout(focusId);
  applyPositions(positions,true);
  animateEdges(oldPos,positions,400);
  renderBreadcrumb();
  renderDetail();
  setTimeout(()=>{animating=false},420);
}

function init(){
  measure();
  positions=layout(focusId);
  buildSVG();
  applyPositions(positions,false);
  renderBreadcrumb();
  renderDetail();
}
init();
window.addEventListener("resize",()=>{measure();positions=layout(focusId);buildSVG();applyPositions(positions,false)});
</script>
</body>
</html>
