<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Zeed — Context Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0F0F12;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100dvh;width:100vw;touch-action:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}
#header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:linear-gradient(180deg,rgba(15,15,18,.95) 60%,transparent)}
#header h1{font-size:16px;font-weight:600;letter-spacing:.3px}
#header .stats{font-size:12px;color:#888;margin-left:12px}
#resetBtn{background:rgba(91,33,182,.25);border:1px solid rgba(91,33,182,.4);color:#c4b5fd;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer}
#resetBtn:hover{background:rgba(91,33,182,.4)}
#detail{position:fixed;bottom:0;left:0;right:0;z-index:10;transform:translateY(100%);transition:transform .3s ease;padding:16px;padding-bottom:max(16px,env(safe-area-inset-bottom))}
#detail.open{transform:translateY(0)}
#detail .card{background:rgba(22,22,28,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;max-width:420px;margin:0 auto}
#detail .label{font-size:18px;font-weight:600;margin-bottom:6px}
#detail .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;margin-bottom:12px}
#detail .conn{margin-top:4px}
#detail .conn-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px;color:#ccc}
#detail .conn-row .bar-bg{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;max-width:80px}
#detail .conn-row .bar{height:100%;border-radius:2px}
</style>
</head>
<body>
<div id="header">
  <div style="display:flex;align-items:baseline"><h1>Context Map</h1><span class="stats" id="stats"></span></div>
  <button id="resetBtn">Reset</button>
</div>
<canvas id="c"></canvas>
<div id="detail"><div class="card" id="detailCard"></div></div>
<script>
const TYPE_COLOR={concept:'#a78bfa',technology:'#60a5fa',decision:'#fb923c',finding:'#4ade80'};
const nodes=[
  {id:0,label:'AI Browser',type:'concept',imp:5},
  {id:1,label:'Memex',type:'concept',imp:4},
  {id:2,label:'Vector DB',type:'technology',imp:4},
  {id:3,label:'sqlite-vec',type:'technology',imp:3},
  {id:4,label:'EmbeddingGemma',type:'technology',imp:3},
  {id:5,label:'Profile/TG/Tab',type:'concept',imp:4},
  {id:6,label:'Chromium 147',type:'technology',imp:3},
  {id:7,label:'Comet',type:'decision',imp:4},
  {id:8,label:'Atlas',type:'decision',imp:3},
  {id:9,label:'LLM Memory',type:'concept',imp:4},
  {id:10,label:'Zettelkasten',type:'concept',imp:3},
  {id:11,label:'semantic retrieval',type:'finding',imp:3},
  {id:12,label:'local-first',type:'decision',imp:4},
  {id:13,label:'GDPR',type:'finding',imp:2},
  {id:14,label:'Mojo IPC',type:'technology',imp:2},
  {id:15,label:'OpenRouter',type:'technology',imp:3},
  {id:16,label:'Agent Loop',type:'concept',imp:4},
  {id:17,label:'CDP',type:'technology',imp:2},
  {id:18,label:'TabStripModel',type:'technology',imp:2},
];
const edgesDef=[
  [0,1,.8],[0,5,.9],[0,6,.7],[0,7,.6],[0,9,.8],[0,12,.7],[0,16,.8],
  [1,10,.7],[1,9,.6],[1,11,.5],
  [2,3,.9],[2,4,.7],[2,11,.8],[2,9,.6],
  [3,12,.5],[3,4,.4],
  [5,6,.6],[5,18,.8],[5,7,.5],
  [6,14,.7],[6,17,.5],[6,18,.6],
  [7,8,.7],[7,16,.6],
  [8,2,.5],[8,11,.6],
  [9,11,.7],[9,4,.5],[9,16,.6],
  [10,11,.5],[10,1,.7],
  [11,4,.6],
  [12,13,.8],[12,3,.5],
  [14,17,.4],
  [15,16,.7],[15,9,.4],
  [16,17,.3],[16,15,.7],
];
const edges=edgesDef.map(([s,t,str])=>({source:s,target:t,strength:str}));

// adjacency
const adj=nodes.map(()=>new Set());
edges.forEach(e=>{adj[e.source].add(e.target);adj[e.target].add(e.source)});

// simulation state
let W,H,cx,cy,zoom=1,panX=0,panY=0;
let selected=-1,dragging=-1,dragOX,dragOY;
let lastTap=0,lastTapNode=-1;

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const statsEl=document.getElementById('stats');
const detailEl=document.getElementById('detail');
const detailCard=document.getElementById('detailCard');

statsEl.textContent=`${nodes.length} nodes \u00b7 ${edges.length} edges`;

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;cx=W/2;cy=H/2}
addEventListener('resize',resize);resize();

function initPositions(){
  nodes.forEach(n=>{
    n.x=(Math.random()-.5)*Math.min(W,H)*.6;
    n.y=(Math.random()-.5)*Math.min(W,H)*.6;
    n.vx=0;n.vy=0;
  });
}
initPositions();

document.getElementById('resetBtn').addEventListener('click',()=>{initPositions();selected=-1;detailEl.classList.remove('open')});

// physics
const REPEL=1800,ATTRACT=.0004,DAMP=.88,CENTER=.0005,DT=1;
function tick(){
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    a.vx-=a.x*CENTER;a.vy-=a.y*CENTER;
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j];
      let dx=a.x-b.x,dy=a.y-b.y;
      let d2=dx*dx+dy*dy;if(d2<1)d2=1;
      const f=REPEL/d2;
      const fx=dx/Math.sqrt(d2)*f,fy=dy/Math.sqrt(d2)*f;
      a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
    }
  }
  edges.forEach(e=>{
    const a=nodes[e.source],b=nodes[e.target];
    let dx=b.x-a.x,dy=b.y-a.y;
    const f=(Math.sqrt(dx*dx+dy*dy)-120)*ATTRACT*e.strength;
    const fx=dx*f,fy=dy*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  });
  nodes.forEach(n=>{
    if(n.id===dragging)return;
    n.vx*=DAMP;n.vy*=DAMP;n.x+=n.vx*DT;n.y+=n.vy*DT;
  });
}

function nodeRadius(n){return 4+n.imp*4}

function toScreen(x,y){return[(x+panX)*zoom+cx,(y+panY)*zoom+cy]}
function toWorld(sx,sy){return[(sx-cx)/zoom-panX,(sy-cy)/zoom-panY]}

function draw(){
  ctx.clearRect(0,0,W,H);
  const isSelected=selected>=0;
  const neighborSet=isSelected?adj[selected]:null;

  // edges
  edges.forEach(e=>{
    const a=nodes[e.source],b=nodes[e.target];
    const [x1,y1]=toScreen(a.x,a.y);
    const [x2,y2]=toScreen(b.x,b.y);
    const highlight=isSelected&&(e.source===selected||e.target===selected);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    if(isSelected&&!highlight){ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=.5}
    else{ctx.strokeStyle=highlight?`rgba(167,139,250,${.3+e.strength*.5})`:`rgba(255,255,255,${.04+e.strength*.1})`;ctx.lineWidth=highlight?1.5*zoom:.8*zoom}
    ctx.stroke();
  });

  // nodes
  nodes.forEach(n=>{
    const [sx,sy]=toScreen(n.x,n.y);
    const r=nodeRadius(n)*zoom;
    const isActive=n.id===selected;
    const isNeighbor=isSelected&&neighborSet.has(n.id);
    const dimmed=isSelected&&!isActive&&!isNeighbor;
    const col=TYPE_COLOR[n.type];

    if(isActive){
      const grad=ctx.createRadialGradient(sx,sy,r*.5,sx,sy,r*3);
      grad.addColorStop(0,'rgba(91,33,182,.4)');grad.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(sx,sy,r*3,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    }

    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=dimmed?'rgba(255,255,255,.06)':col;
    ctx.globalAlpha=dimmed?.3:1;ctx.fill();ctx.globalAlpha=1;

    if(isActive||isNeighbor){ctx.strokeStyle=isActive?'#5B21B6':'rgba(255,255,255,.2)';ctx.lineWidth=isActive?2:1;ctx.stroke()}

    // labels: show if important, nearby to center, selected, or neighbor
    const dist=Math.sqrt(sx*sx+sy*sy);
    const showLabel=n.imp>=4||isActive||isNeighbor||(zoom>1.2&&n.imp>=3);
    if(showLabel){
      ctx.font=`${Math.round(11*Math.max(zoom,.8))}px -apple-system,sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillStyle=dimmed?'rgba(255,255,255,.15)':'rgba(255,255,255,.85)';
      ctx.fillText(n.label,sx,sy+r+4*zoom);
    }
  });
}

function loop(){tick();draw();requestAnimationFrame(loop)}
loop();

// hit test
function hitNode(sx,sy){
  for(let i=nodes.length-1;i>=0;i--){
    const [nx,ny]=toScreen(nodes[i].x,nodes[i].y);
    const r=nodeRadius(nodes[i])*zoom+6;
    if((sx-nx)**2+(sy-ny)**2<r*r)return i;
  }
  return -1;
}

function showDetail(id){
  const n=nodes[id];
  const conns=[];
  edges.forEach(e=>{
    if(e.source===id)conns.push({node:nodes[e.target],str:e.strength});
    else if(e.target===id)conns.push({node:nodes[e.source],str:e.strength});
  });
  conns.sort((a,b)=>b.str-a.str);
  const col=TYPE_COLOR[n.type];
  detailCard.innerHTML=`<div class="label">${n.label}</div>
    <span class="badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${n.type}</span>
    <div class="conn">${conns.map(c=>`<div class="conn-row"><span style="width:110px;flex-shrink:0">${c.node.label}</span><div class="bar-bg"><div class="bar" style="width:${c.str*100}%;background:${col}"></div></div><span style="color:#666;font-size:11px">${c.str.toFixed(1)}</span></div>`).join('')}</div>`;
  detailEl.classList.add('open');
}

function centerOnNode(id){
  const n=nodes[id];
  panX=-n.x;panY=-n.y;zoom=2;
}

// pointer events
let pointers=new Map(),pinchDist0=0,pinchZoom0=1;

canvas.addEventListener('pointerdown',e=>{
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===1){
    const hit=hitNode(e.clientX,e.clientY);
    if(hit>=0){
      dragging=hit;
      const [wx,wy]=toWorld(e.clientX,e.clientY);
      dragOX=nodes[hit].x-wx;dragOY=nodes[hit].y-wy;
      const now=Date.now();
      if(lastTapNode===hit&&now-lastTap<350){centerOnNode(hit);selected=hit;showDetail(hit)}
      else{selected=hit;showDetail(hit)}
      lastTap=now;lastTapNode=hit;
    }else{
      selected=-1;detailEl.classList.remove('open');
      dragging=-2;dragOX=panX;dragOY=panY;
    }
  }
  if(pointers.size===2){
    dragging=-1;
    const pts=[...pointers.values()];
    pinchDist0=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    pinchZoom0=zoom;
  }
});

canvas.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId))return;
  const prev=pointers.get(e.pointerId);
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){
    const pts=[...pointers.values()];
    const dist=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    zoom=Math.max(.3,Math.min(5,pinchZoom0*(dist/pinchDist0)));
    return;
  }
  if(dragging>=0){
    const [wx,wy]=toWorld(e.clientX,e.clientY);
    nodes[dragging].x=wx+dragOX;nodes[dragging].y=wy+dragOY;
    nodes[dragging].vx=0;nodes[dragging].vy=0;
  }else if(dragging===-2){
    const dx=(e.clientX-prev.x)/zoom,dy=(e.clientY-prev.y)/zoom;
    panX=panX+dx;panY=panY+dy;
  }
});

const upHandler=e=>{pointers.delete(e.pointerId);if(pointers.size<2)dragging=-1};
canvas.addEventListener('pointerup',upHandler);
canvas.addEventListener('pointercancel',upHandler);

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY>0?.92:1.08;
  zoom=Math.max(.3,Math.min(5,zoom*factor));
},{passive:false});
</script>
</body>
</html>
