<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zeed — UI Demo</title>
<style>
:root{--base:#0f0f12;--el1:#1a1a1f;--bdr:#2a2a31;--ac:#5b21b6;--tx:#e8e8e8;--sub:#9e9ea8}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--base);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
h1{font-size:26px;margin:0 0 4px}
.sub{font-size:13px;color:var(--sub);margin-bottom:28px}
.section{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px;width:100%;max-width:680px}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:680px;width:100%}
.card{flex:1 1 280px;max-width:320px;background:var(--el1);border:1px solid var(--bdr);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:8px;text-decoration:none;color:inherit;transition:transform .12s,border-color .12s}
.card:hover{transform:translateY(-2px);border-color:var(--ac)}
.card-t{font-size:14px;font-weight:600}
.card-d{font-size:11.5px;color:var(--sub);line-height:1.5}
.tag{font-size:10px;color:var(--ac);background:rgba(91,33,182,.12);padding:2px 7px;border-radius:999px;align-self:flex-start}
footer{margin-top:32px;font-size:10px;color:var(--sub)}
footer a{color:var(--ac)}
</style>
</head>
<body>
<h1>Zeed UI Demo</h1>
<p class="sub">人と考え、実行する AI ブラウザ</p>

<div class="section">SP</div>
<div class="cards">
  <a class="card" href="sp/a.html">
    <span class="tag">SP</span>
    <span class="card-t">Right-edge bar + Insight</span>
    <span class="card-d">右端6アイコン固定バー。Insight統合フライアウト。インラインチャット応答。スクロール連動バッジ。</span>
  </a>
</div>

<div class="section">PC</div>
<div class="cards">
  <a class="card" href="pc/">
    <span class="tag">PC</span>
    <span class="card-t">Vertical tabs + Context Map</span>
    <span class="card-d">縦タブ + 右サイドバー (Chat / Memory / Context Map)。スクロール連動キーワード検出で最大3記事推薦。Auto デモ付き。</span>
  </a>
</div>

<footer>vanilla HTML, no API — <a href="https://github.com/efg-technologies/zeed-mocks">source</a></footer>
</body>
</html>
