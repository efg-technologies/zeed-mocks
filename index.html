<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zeed — UI Demo</title>
<style>
:root{--base:#0f0f12;--el1:#1a1a1f;--border:#2a2a31;--accent:#5b21b6;--text:#e8e8e8;--sub:#9e9ea8}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--base);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
h1{font-size:28px;margin:0 0 6px}
.sub{font-size:14px;color:var(--sub);margin-bottom:32px}
.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:640px;width:100%}
.card{flex:1 1 260px;max-width:300px;background:var(--el1);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:10px;text-decoration:none;color:inherit;transition:transform .12s,border-color .12s}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card-title{font-size:16px;font-weight:600}
.card-desc{font-size:13px;color:var(--sub);line-height:1.5}
.tag{font-size:11px;color:var(--accent);background:rgba(91,33,182,.12);padding:3px 8px;border-radius:999px;align-self:flex-start}
footer{margin-top:40px;font-size:11px;color:var(--sub)}
footer a{color:var(--accent)}
</style>
</head>
<body>
<h1>Zeed UI Demo</h1>
<p class="sub">人と考え、実行する AI ブラウザ</p>
<div class="cards">
  <a class="card" href="sp/">
    <span class="tag">📱 SP</span>
    <span class="card-title">スマートフォン版</span>
    <span class="card-desc">フル画面サイドバー + overlay bottom-sheet。▶ ボタンでデモ自動再生。</span>
  </a>
  <a class="card" href="pc/">
    <span class="tag">🖥 PC</span>
    <span class="card-title">デスクトップ版</span>
    <span class="card-desc">fake ページ + 380px サイドバー + overlay widget。▶ ボタンで統合デモ再生。</span>
  </a>
</div>
<footer>vanilla HTML, no API — <a href="https://github.com/efg-technologies/zeed-mocks">source</a></footer>
</body>
</html>
